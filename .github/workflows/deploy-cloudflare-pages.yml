name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 24
  BUILD_OUTPUT_DIR: dist/ai-content-generation-admin-fe/browser
  CLOUDFLARE_ACCOUNT_ID: 041f3c8b8004f330518bc1cc05c581e0
  CLOUDFLARE_PAGES_PROJECT_NAME: heyjivu-admin-frontend

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    steps:
      - name: Validate branch
        if: github.ref_name != 'main' && github.ref_name != 'staging'
        run: |
          echo "Unsupported deployment branch: ${{ github.ref_name }}"
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build staging
        if: github.ref_name == 'staging'
        run: npm run build -- --configuration staging

      - name: Build production
        if: github.ref_name == 'main'
        run: npm run build -- --configuration production

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "CLOUDFLARE_API_TOKEN secret is missing."; exit 1; }

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ env.BUILD_OUTPUT_DIR }} --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=${{ github.ref_name }}
