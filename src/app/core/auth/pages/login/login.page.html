<div class="login-container">
  <div class="login-card glass" role="main" aria-label="heyjivu Login">
    <div class="login-header">
      <div class="hj-brand-mark hj-brand-mark--auth" aria-hidden="true">
  <span class="hj-brand-face">
    <span class="hj-brand-eye hj-brand-eye--left"></span>
    <span class="hj-brand-eye hj-brand-eye--right"></span>
    <span class="hj-brand-smile"></span>
    <span class="hj-brand-spark hj-brand-spark--one"></span>
    <span class="hj-brand-spark hj-brand-spark--two"></span>
  </span>
</div>
      <h1 class="hj-brand-word hj-brand-word--auth"><span class="hj-brand-hey">hey</span><span class="hj-brand-jivu">jivu</span></h1>
      <p>Sign in to your personal AI content memory.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Email or Username</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope" aria-hidden="true"></i>
          <input
            type="text"
            id="username"
            formControlName="username"
            placeholder="Enter your email or username"
            autocomplete="email"
            autocapitalize="none"
          >
          <span class="focus-ring" aria-hidden="true"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper password-field">
          <i class="fas fa-lock" aria-hidden="true"></i>
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          >
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            <i class="fas" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword" aria-hidden="true"></i>
          </button>
          <span class="focus-ring" aria-hidden="true"></span>
        </div>
      </div>

      <button
        type="submit"
        class="btn-login"
        [disabled]="loginForm.invalid || store.loading()"
      >
        <span *ngIf="!store.loading()">Sign In</span>
        <span *ngIf="store.loading()"><i class="fas fa-spinner fa-spin"></i> Signing In...</span>
      </button>

      <div class="register-link">
        Don't have an account? <a routerLink="/register">Register here</a>
      </div>
    </form>

    <div class="divider">
      <span>OR</span>
    </div>

    <div class="google-auth-section">
      <div id="googleButtonWrapper" aria-label="Sign in with Google"></div>

      <div class="server-error" role="alert" *ngIf="store.error()" [attr.aria-live]="'polite'">
        <i class="fas fa-exclamation-circle" aria-hidden="true"></i>
        {{ store.error() }}
      </div>

      <div class="loading-state" *ngIf="store.loading()" aria-live="polite" aria-busy="true">
        <i class="fas fa-spinner fa-spin" aria-hidden="true"></i>
        <span>Connecting securely...</span>
      </div>
    </div>

    <div class="auth-legal-links" aria-label="Legal links">
      <span>By continuing, you agree to HeyJivu's</span>
      <a routerLink="/terms">Terms</a>
      <span>and</span>
      <a routerLink="/privacy">Privacy Policy</a>
      <a routerLink="/google-oauth-disclosure">Google OAuth disclosure</a>
    </div>
  </div>
</div>
