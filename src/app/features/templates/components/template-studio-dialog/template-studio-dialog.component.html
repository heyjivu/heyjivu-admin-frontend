<div class="studio-modal-backdrop" (click)="cancel.emit()">
  <div class="studio-modal" (click)="$event.stopPropagation()">
    <div class="studio-modal__header">
      <div class="studio-modal__icon">
        <i class="fas" [ngClass]="iconClass"></i>
      </div>
      <div>
        <div class="studio-modal__title">{{ title }}</div>
        <div class="studio-modal__sub">Admin item saved to the shared R2 library</div>
      </div>
      <button class="studio-modal__close" type="button" (click)="cancel.emit()" aria-label="Close dialog" [disabled]="saving">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="studio-modal__body">
      <div class="studio-form-grid">
        <div class="studio-field">
          <label>Name</label>
          <input
            class="studio-input"
            [ngModel]="itemName"
            (ngModelChange)="itemNameChange.emit($event)"
            placeholder="Name" />
        </div>
        <div class="studio-field">
          <label>Status</label>
          <label class="studio-toggle-row">
            <span>{{ isActive ? 'Active' : 'Inactive' }}</span>
            <span class="studio-switch">
              <input type="checkbox" [ngModel]="isActive" (ngModelChange)="isActiveChange.emit($event)" />
              <span class="studio-switch__track"></span>
            </span>
          </label>
        </div>

        <div class="studio-field studio-field--full">
          <label>Category</label>
          @if (kind === 'soundtrack') {
            <div class="studio-category-controls">
              <select
                class="studio-input"
                aria-label="Existing soundtrack category"
                [ngModel]="selectedCategoryOption"
                (ngModelChange)="onCategoryOptionSelected($event)">
                <option value="">Select an existing category</option>
                @for (option of categoryOptions; track option) {
                  <option [value]="option">{{ option }}</option>
                }
                <option [value]="newCategoryValue">New category...</option>
              </select>
              @if (showCustomCategoryInput) {
                <input
                  class="studio-input"
                  aria-label="New soundtrack category"
                  [ngModel]="category"
                  (ngModelChange)="categoryChange.emit($event)"
                  [placeholder]="categoryPlaceholder" />
              }
            </div>
          } @else {
            <input
              class="studio-input"
              [ngModel]="category"
              (ngModelChange)="categoryChange.emit($event)"
              [placeholder]="categoryPlaceholder" />
          }
        </div>

        <div class="studio-field studio-field--full">
          <label>Attachment</label>
          <input
            #studioAttachmentInput
            class="studio-file-input"
            type="file"
            [accept]="attachmentAccept"
            (change)="onAttachmentSelected($event)" />
          <div class="studio-upload-row">
            <button class="btn btn-soft" type="button" (click)="studioAttachmentInput.click()" [disabled]="saving">
              <i class="fas fa-paperclip"></i>
              {{ attachmentName || (editing ? 'Replace attachment' : 'Choose attachment') }}
            </button>
            @if (attachmentName) {
              <button class="studio-icon-btn" type="button" (click)="clearAttachment(studioAttachmentInput)" [disabled]="saving" title="Remove selected attachment">
                <i class="fas fa-times"></i>
              </button>
            }
          </div>
          @if (editing && !attachmentName) {
            <div class="studio-inline-note">Existing attachment remains unchanged unless you choose a new one.</div>
          }
        </div>

      </div>
    </div>

    <div class="studio-modal__footer">
      <button class="btn btn-ghost" type="button" (click)="cancel.emit()" [disabled]="saving">Cancel</button>
      <button class="btn btn-primary" type="button" (click)="save.emit()" [disabled]="!canSave">
        <i class="fas" [class.fa-save]="!saving" [class.fa-spinner]="saving" [class.fa-spin]="saving"></i>
        {{ saving ? 'Saving' : 'Save' }}
      </button>
    </div>
  </div>
</div>
