<div class="dialog-header">
  <div>
    <h2 class="dialog-title">{{ title }}</h2>
    <p class="dialog-subtitle">Choose the admin-managed audience for this pipeline run.</p>
  </div>

  <button class="dialog-close" type="button" (click)="close()" [disabled]="isSubmitting()" aria-label="Close dialog">
    <i class="pi pi-times"></i>
  </button>
</div>

<div class="dialog-content">
  <div class="flex flex-column gap-4">
    <div class="flex flex-column gap-2">
      <label class="font-semibold text-sm text-color-primary">Target Roles</label>
      <p-multiSelect
        [options]="roles()"
        [(ngModel)]="selectedRoles"
        optionLabel="name"
        optionValue="id"
        placeholder="Select Roles"
        styleClass="w-full"
        [filter]="true"
      ></p-multiSelect>
      <small class="text-color-secondary">Trigger job for all active users assigned to these roles</small>
    </div>

    <div class="flex flex-column gap-2">
      <label class="font-semibold text-sm text-color-primary">Target Users</label>
      <p-multiSelect
        [options]="users()"
        [(ngModel)]="selectedUsers"
        optionLabel="username"
        optionValue="id"
        placeholder="Select Specific Users"
        styleClass="w-full"
        [filter]="true"
      ></p-multiSelect>
      <small class="text-color-secondary">Trigger job directly for these specific users</small>
    </div>

    <div class="info-box info-box-warning text-xs leading-normal">
      <i class="fas fa-exclamation-triangle mr-2 text-sm"></i>
      This run will stamp database records as initiated by your administrator username in the audit history.
    </div>
  </div>
</div>

<div class="dialog-footer">
  <button class="btn btn-soft py-2 px-3 text-sm" (click)="close()" [disabled]="isSubmitting()">
    Cancel
  </button>
  <button class="btn btn-primary py-2 px-4 text-sm" (click)="triggerJob()" [disabled]="isSubmitting()">
    <i class="fas fa-spinner fa-spin mr-1.5" *ngIf="isSubmitting()"></i>
    Trigger Job
  </button>
</div>
